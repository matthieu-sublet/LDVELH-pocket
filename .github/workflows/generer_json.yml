name: Generer Inventaire JSON
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Generer JSON
        run: python generer_json.py
      - name: Commit et Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add inventaire_livres.json
          git commit -m "Mise à jour automatique de l'inventaire" || exit 0
          git push
